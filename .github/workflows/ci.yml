name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make lint
      - run: make test
      - run: make audit-public
      - run: make build
      # Cross-compile check
      - run: GOOS=darwin GOARCH=arm64 go build ./cmd/shellroute
      - run: GOOS=darwin GOARCH=amd64 go build ./cmd/shellroute
      - run: GOOS=linux GOARCH=arm64 go build ./cmd/shellroute
